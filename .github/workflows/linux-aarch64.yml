name: Build Numero (Linux ARM64)

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            make

      - name: Build
        run: |
          make platform=unix \
            CC=aarch64-linux-gnu-gcc \
            CXX=aarch64-linux-gnu-g++

      - name: Upload core
        uses: actions/upload-artifact@v4
        with:
          name: numero-libretro-aarch64
          path: "*.so"
